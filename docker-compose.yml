services:
  x-bot:
    image: constructure-x-bot:latest
    build: .
    container_name: x-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: ./.env.local
        required: false
    environment:
      PORT: "7710"
      X_PLATFORM_API_BASE: "http://127.0.0.1:3001/platforms/api/platforms/x"
      MINIMAX_MODEL: "MiniMax-M2.5-highspeed"
      XBOT_LANGUAGE: "auto"
      # MINIMAX_API_KEY: set in .env.local
